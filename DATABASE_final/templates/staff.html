<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Staff Login Selection</title>
    <style>
        body {
            font-family: "Times New Roman", serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: url("{{ url_for('static', filename='492005453_1078773277617540_8286173066551137313_n.jpg') }}");
            background-size: cover;
            background-position: center;
        }
        .overlay {
            background: rgba(0,0,0,0.6);
            padding: 40px;
            border-radius: 12px;
            text-align: center;
        }
        h1 {
            color: white;
            margin-bottom: 20px;
        }
        .btn {
            display: block;
            width: 100%;
            margin: 10px 0;
            padding: 14px;
            background-color: #410a05;
            color: white;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
            font-family: "Times New Roman", serif;
        }
        .btn:hover {
            background-color: #931342;
            transform: scale(1.05);
        }
        a { text-decoration: none; }
   
    .back-link {
        
        color: white;
        text-decoration: none;
        font-weight: bold;
        font-family: "Times New Roman", serif;
        display: inline-block;
        margin-top: 15px;
    }

    .back-link:hover {
    color: #a4161a; 
    text-decoration: underline;
    }


        
    </style>
</head>
<body>
    <div class="overlay">
        <h1>Select Your Role</h1>
        <a href="{{ url_for('employee') }}"><button class="btn">Employee</button></a>
        <a href="{{ url_for('manager') }}"><button class="btn">Manager</button></a>
        <a href="{{ url_for('home') }}" class="back-link">
            &larr; Back to Role Selection
        </a>
    </div>
</body>
</html>
