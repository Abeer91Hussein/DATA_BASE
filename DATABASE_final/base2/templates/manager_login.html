<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Manager Login</title>
<style>
body {
    font-family: "Times New Roman", serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    background-image: url("{{ url_for('static', filename='492005453_1078773277617540_8286173066551137313_n.jpg') }}");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    filter: brightness(0.8) contrast(1.1);
}

.login-box {
    background: rgba(0,0,0,0.6);
    padding: 30px;
    border-radius: 10px;
    color: white;
    width: 300px;
    text-align: center;
}

.login-box input {
    width: 90%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 5px;
    border: none;
}

.login-box button {
    width: 95%;
    padding: 10px;
    background-color:  #410a05;
    border: none;
    border-radius: 5px;
    color: white;
    cursor: pointer;
    font-family: "Times New Roman", serif;
}

.login-box button:hover {
    background-color:  #410a05;
}
</style>
</head>
<body>
<div class="login-box">
    <h2>Manager Login</h2>
    <form method="POST">
        <input type="number" name="manager_id" placeholder="Manager ID" required><br>
        <input type="password" name="password" placeholder="Password" required><br>
        <button type="submit">Login</button>
    </form>
    {% if error %}
        <p style="color: red;">{{ error }}</p>
    {% endif %}
</div>
</body>
</html>
