<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cart</title>

<style>
html, body {
    height: 100%;
    margin: 0;
}

body {
    font-family: "Times New Roman", serif;
    background-image: url("{{ url_for('static', filename='1.jpg') }}");
    background-size: cover;
    background-position: center;
    filter: brightness(0.9) contrast(1.1);
}

header {
    background: rgba(0,0,0,0.6);
    color: white;
    padding: 15px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

header a {
    color: white;
    text-decoration: none;
}

.content {
    margin-top: 60px;
    text-align: center;
}

.box {
    background: rgba(0,0,0,0.5);
    display: inline-block;
    padding: 30px 50px;
    border-radius: 15px;
    color: white;
    min-width: 400px;
}

.cart-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin: 10px 0;
    padding: 10px;
    background: rgba(255,255,255,0.1);
    border-radius: 10px;
}

.cart-item button {
    background: #410a05;
    color: white;
    border: none;
    padding: 5px 10px;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.3s;
}

.cart-item button:hover {
    transform: scale(1.05);
}

.total {
    margin-top: 20px;
    font-size: 20px;
    font-weight: bold;
}


.back-btn {
    display: inline-block;
    margin-top: 20px;
    background-color: #410a05;
    color: white;
    padding: 10px 25px;
    border-radius: 10px;
    text-decoration: none;
    font-size: 16px;
    transition: 0.3s;
}

.back-btn:hover {
    transform: scale(1.05);
}

</style>
</head>

<body>

<header>
    <h2>Cart</h2>
    <a href="{{ url_for('customer_portal') }}" class="back-btn">⬅ Back</a>
</header>

<div class="content">
    <div class="box">
        <h1>Your Cart</h1>

        {% if cart_items %}
            {% for item in cart_items %}
            <div class="cart-item">
                <span>
                    {{ item.product_name }} ({{ item.quantity }}) - ${{ item.total }}
                </span>
                   <form action="{{ url_for('remove_from_cart') }}" method="POST" style="margin:0;">
                    <input type="hidden" name="product_id" value="{{ item.product_id }}">
                <button type="submit"> Remove</button>
                </form>
            </form>
            </div>
            {% endfor %}

            <div class="total">
                Total Price: ${{ total_price }}
            </div>

            <form action="{{ url_for('checkout') }}" method="POST">
                <button type="submit"
                    style="margin-top:15px;background:#410a05;color:white;
                           padding:10px 20px;border:none;border-radius:10px;">
                    Checkout
                </button>
            </form>

        {% else %}
            <p>Your cart is empty.</p>
        {% endif %}

        <br>
        <a href="{{ url_for('customer_products') }}"
           style="color:white;background:#410a05;padding:10px 20px;
                  border-radius:10px;text-decoration:none;">
           Add More Products
        </a>
    </div>
</div>

</body>
</html>
